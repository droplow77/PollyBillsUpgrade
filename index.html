<!DOCTYPE html>
<html>
<head>
  <title>Polly's Bills</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#f4f6f8; padding:16px; margin:0;}
    .container { max-width:900px; margin:auto; }

    h1 { text-align:center; }
    h2 { margin-top:30px; border-bottom:2px solid #ddd; padding-bottom:6px;}

    .card, .add-card {
      background:white;
      border-radius:12px;
      padding:14px;
      margin:10px 0;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }

    .row {
      display:grid;
      grid-template-columns:1.5fr 1fr 1fr auto;
      gap:10px;
      align-items:center;
    }

    .simple-row {
      display:grid;
      grid-template-columns:1.5fr auto;
      gap:10px;
      align-items:center;
    }

    input, select {
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
      width:100%;
      font-size:16px;
    }

    .money-box { position:relative; }
    .money-box span {
      position:absolute;
      left:10px;
      top:50%;
      transform:translateY(-50%);
    }
    .money-box input { padding-left:20px; }

    a, button {
      background:#1a73e8;
      color:white;
      padding:10px;
      border-radius:8px;
      text-decoration:none;
      text-align:center;
      border:none;
      cursor:pointer;
    }

    .remove { background:#d93025; }
    .confirm { background:#8b0000; }
    .cancel { background:#666; }

    .check-row {
      display:flex;
      gap:20px;
      margin-top:10px;
    }

    .notes { margin-top:10px; }

    @media(max-width:700px){
      .row, .simple-row { grid-template-columns:1fr; }
      a, button { width:100%; }
    }
  </style>
</head>

<body>
<div class="container">

<h1>Polly's Bills</h1>

<div id="app"></div>

<h2>Add New Account</h2>
<div class="add-card">

<select id="newCategory">
  <option value="Bills">Bill</option>
  <option value="Bank Accounts">Bank Account</option>
  <option value="Email">Email</option>
</select>

<input id="newBiller" placeholder="Name">
<input id="newWebsite" placeholder="Website">

<input id="newDueDate" type="date" class="bill-only">

<div class="money-box bill-only">
  <span>$</span>
  <input id="newAmount" placeholder="Amount">
</div>

<select id="newAutoPay" class="bill-only">
  <option value="FALSE">AutoPay No</option>
  <option value="TRUE">AutoPay Yes</option>
</select>

<input id="newNotes" placeholder="Notes">

<button onclick="addNew()">Add</button>

</div>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbyrQvUJoyFMkGR5WERF3W4U4TNaab8yXdiVbHPW7eD_BwkJSSLHMpGpDnfN2ERZB0NnZw/exec";

function load(){
fetch(URL).then(r=>r.json()).then(data=>{
render(data);
});
}

function render(data){
const app=document.getElementById("app");
app.innerHTML="";

const cats=["Bank Accounts","Email","Bills"];

cats.forEach(cat=>{
const section=document.createElement("div");
section.innerHTML=`<h2>${cat}</h2>`;

data.filter(x=>x.Category===cat).forEach(item=>{
const card=document.createElement("div");
card.className="card";

if(cat==="Bills"){
card.innerHTML=`
<div class="row">
<div>${item.Biller}</div>

<input type="date" value="${format(item.DueDate)}"
onchange="save('${item.ID}','DueDate',this.value)">

<div class="money-box">
<span>$</span>
<input value="${item.Amount||""}"
onchange="save('${item.ID}','Amount',this.value)">
</div>

<a href="${item.Website}" target="_blank">Visit</a>
</div>

<div class="check-row">
<label><input type="checkbox" ${item.Paid==="TRUE"?"checked":""}
onchange="save('${item.ID}','Paid',this.checked?'TRUE':'FALSE')">Paid</label>

<label><input type="checkbox" ${item.AutoPay==="TRUE"?"checked":""}
onchange="save('${item.ID}','AutoPay',this.checked?'TRUE':'FALSE')">AutoPay</label>
</div>

<div class="notes">
<input value="${item.Notes||""}" placeholder="Notes"
onchange="save('${item.ID}','Notes',this.value)">
</div>

${removeUI(item.ID,item.Biller)}
`;
}else{
card.innerHTML=`
<div class="simple-row">
<div>${item.Biller}</div>
<a href="${item.Website}" target="_blank">Visit</a>
</div>

<div class="notes">
<input value="${item.Notes||""}" placeholder="Notes"
onchange="save('${item.ID}','Notes',this.value)">
</div>

${removeUI(item.ID,item.Biller)}
`;
}

section.appendChild(card);
});

app.appendChild(section);
});
}

function removeUI(id,name){
return `
<button class="remove" onclick="confirmRemove(this)">Remove</button>

<div class="confirm-area" style="display:none;">
<div>Remove ${name}?</div>
<button class="confirm" onclick="remove('${id}')">Confirm</button>
<button class="cancel" onclick="cancel(this)">Cancel</button>
</div>
`;
}

function confirmRemove(btn){
btn.style.display="none";
btn.nextElementSibling.style.display="block";
}

function cancel(btn){
btn.parentElement.style.display="none";
btn.parentElement.previousElementSibling.style.display="block";
}

function remove(id){
fetch(URL,{
method:"POST",
body:JSON.stringify({Action:"DELETE",ID:id})
}).then(()=>load());
}

function save(id,field,val){
fetch(URL,{
method:"POST",
body:JSON.stringify({ID:id,[field]:val})
});
}

function addNew(){
fetch(URL,{
method:"POST",
body:JSON.stringify({
Action:"ADD",
ID:Date.now(),
Category:newCategory.value,
Biller:newBiller.value,
Website:newWebsite.value,
DueDate:newDueDate.value,
Amount:newAmount.value,
Paid:"FALSE",
AutoPay:newAutoPay.value,
Notes:newNotes.value
})
}).then(()=>load());
}

function format(d){
if(!d) return "";
return new Date(d).toISOString().split("T")[0];
}

load();
</script>

</body>
</html>
