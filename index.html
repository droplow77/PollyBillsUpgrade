<!DOCTYPE html>
<html>
<head>
  <title>Polly's Bills</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 8px;
    }

    .card, .add-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .bank-row {
      display: grid;
      grid-template-columns: 1.5fr auto;
      gap: 10px;
      align-items: center;
    }

    .add-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .biller {
      font-size: 18px;
      font-weight: bold;
    }

    a.pay-button,
    button {
      background: #1a73e8;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      text-align: center;
      white-space: nowrap;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    button {
      margin-top: 15px;
      width: 100%;
    }

    input,
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      width: 100%;
      box-sizing: border-box;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      color: #444;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .money-box {
      position: relative;
    }

    .money-box span {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-weight: bold;
    }

    .money-box input {
      padding-left: 24px;
    }

    .paid-area {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notes {
      margin-top: 10px;
    }

    .status {
      text-align: center;
      color: #666;
      margin: 15px 0;
    }

    .save-msg {
      font-size: 13px;
      color: #357a38;
      margin-top: 8px;
      display: none;
    }

    .add-status {
      text-align: center;
      margin-top: 10px;
      color: #357a38;
      display: none;
    }

    @media (max-width: 700px) {
      .row,
      .bank-row,
      .add-grid {
        grid-template-columns: 1fr;
      }

      a.pay-button {
        display: block;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Polly's Bills</h1>
    <div class="subtitle">Bill links, due dates, and payment amounts</div>

    <div id="status" class="status">Loading bills...</div>
    <div id="app"></div>

    <section>
      <h2>Add New Account</h2>

      <div class="add-card">
        <div class="add-grid">
          <div class="field">
            <label>Type</label>
            <select id="newCategory" onchange="toggleNewFields()">
              <option value="Bills">Bill</option>
              <option value="Bank Accounts">Bank Account</option>
            </select>
          </div>

          <div class="field">
            <label>Name</label>
            <input id="newBiller" type="text" placeholder="Example: Duke Energy">
          </div>

          <div class="field">
            <label>Website</label>
            <input id="newWebsite" type="text" placeholder="https://example.com">
          </div>

          <div class="field bill-only">
            <label>Due Date</label>
            <input id="newDueDate" type="date">
          </div>

          <div class="field bill-only">
            <label>Amount</label>
            <div class="money-box">
              <span>$</span>
              <input id="newAmount" type="number" step="0.01" placeholder="Amount">
            </div>
          </div>

          <div class="field">
            <label>Notes</label>
            <input id="newNotes" type="text" placeholder="Optional notes">
          </div>
        </div>

        <button onclick="addNewAccount()">Add Account</button>
        <div id="addStatus" class="add-status">Added successfully</div>
      </div>
    </section>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrQvUJoyFMkGR5WERF3W4U4TNaab8yXdiVbHPW7eD_BwkJSSLHMpGpDnfN2ERZB0NnZw/exec";

    const app = document.getElementById("app");
    const statusBox = document.getElementById("status");

    function loadBills() {
      fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
          statusBox.textContent = "";
          renderBills(data);
        })
        .catch(error => {
          statusBox.textContent = "Could not load bills. Check Apps Script permissions.";
          console.error(error);
        });
    }

    function renderBills(items) {
      app.innerHTML = "";

      const categories = [...new Set(items.map(item => item.Category))];

      categories.forEach(category => {
        const section = document.createElement("section");
        section.innerHTML = `<h2>${category}</h2>`;

        items
          .filter(item => item.Category === category)
          .forEach(item => {
            const card = document.createElement("div");
            card.className = "card";

            if (category === "Bank Accounts") {
              card.innerHTML = `
                <div class="bank-row">
                  <div class="biller">${item.Biller || ""}</div>

                  ${item.Website 
                    ? `<a class="pay-button" href="${item.Website}" target="_blank">Visit Website</a>` 
                    : `<span></span>`
                  }
                </div>

                <div class="notes">
                  <input 
                    type="text" 
                    placeholder="Notes"
                    value="${item.Notes || ""}"
                    onchange="saveField('${item.ID}', 'Notes', this.value, this)"
                  >
                </div>

                <div class="save-msg">Saved</div>
              `;
            } else {
              card.innerHTML = `
                <div class="row">
                  <div class="biller">${item.Biller || ""}</div>

                  <input 
                    type="date" 
                    value="${formatDate(item.DueDate)}"
                    onchange="saveField('${item.ID}', 'DueDate', this.value, this)"
                  >

                  <div class="money-box">
                    <span>$</span>
                    <input 
                      type="number" 
                      step="0.01"
                      placeholder="Amount"
                      value="${item.Amount || ""}"
                      onchange="saveField('${item.ID}', 'Amount', this.value, this)"
                    >
                  </div>

                  ${item.Website 
                    ? `<a class="pay-button" href="${item.Website}" target="_blank">Visit Website</a>` 
                    : `<span></span>`
                  }
                </div>

                <div class="paid-area">
                  <input 
                    type="checkbox" 
                    ${String(item.Paid).toUpperCase() === "TRUE" ? "checked" : ""}
                    onchange="saveField('${item.ID}', 'Paid', this.checked ? 'TRUE' : 'FALSE', this)"
                  >
                  <label>Paid</label>
                </div>

                <div class="notes">
                  <input 
                    type="text" 
                    placeholder="Notes"
                    value="${item.Notes || ""}"
                    onchange="saveField('${item.ID}', 'Notes', this.value, this)"
                  >
                </div>

                <div class="save-msg">Saved</div>
              `;
            }

            section.appendChild(card);
          });

        app.appendChild(section);
      });
    }

    function saveField(id, field, value, element) {
      const card = element.closest(".card");
      const msg = card.querySelector(".save-msg");

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          ID: id,
          [field]: value
        })
      })
      .then(response => response.text())
      .then(() => {
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 1200);
      })
      .catch(error => {
        alert("Could not save. Check connection or Apps Script settings.");
        console.error(error);
      });
    }

    function addNewAccount() {
      const category = document.getElementById("newCategory").value;
      const biller = document.getElementById("newBiller").value.trim();
      const website = document.getElementById("newWebsite").value.trim();
      const dueDate = document.getElementById("newDueDate").value;
      const amount = document.getElementById("newAmount").value;
      const notes = document.getElementById("newNotes").value.trim();

      if (!biller) {
        alert("Please enter a name.");
        return;
      }

      const id = createID(biller);

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          Action: "ADD",
          ID: id,
          Category: category,
          Biller: biller,
          Website: website,
          DueDate: category === "Bills" ? dueDate : "",
          Amount: category === "Bills" ? amount : "",
          Paid: "FALSE",
          Notes: notes
        })
      })
      .then(response => response.text())
      .then(() => {
        document.getElementById("addStatus").style.display = "block";

        document.getElementById("newBiller").value = "";
        document.getElementById("newWebsite").value = "";
        document.getElementById("newDueDate").value = "";
        document.getElementById("newAmount").value = "";
        document.getElementById("newNotes").value = "";

        setTimeout(() => {
          document.getElementById("addStatus").style.display = "none";
        }, 1500);

        loadBills();
      })
      .catch(error => {
        alert("Could not add account.");
        console.error(error);
      });
    }

    function createID(name) {
      return name
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "") + "-" + Date.now();
    }

    function toggleNewFields() {
      const category = document.getElementById("newCategory").value;
      const billOnlyFields = document.querySelectorAll(".bill-only");

      billOnlyFields.forEach(field => {
        field.style.display = category === "Bills" ? "flex" : "none";
      });
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (isNaN(date)) return value;
      return date.toISOString().split("T")[0];
    }

    toggleNewFields();
    loadBills();
  </script>
</body>
</html>
