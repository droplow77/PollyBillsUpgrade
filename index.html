<!DOCTYPE html>
<html>
<head>
  <title>Polly Bills</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 8px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .biller {
      font-size: 18px;
      font-weight: bold;
    }

    a.pay-button {
      background: #1a73e8;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      text-align: center;
      white-space: nowrap;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"] {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      width: 100%;
      box-sizing: border-box;
    }

    .paid-area {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .notes {
      margin-top: 10px;
    }

    .status {
      text-align: center;
      color: #666;
      margin: 15px 0;
    }

    .save-msg {
      font-size: 13px;
      color: #357a38;
      margin-top: 8px;
      display: none;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }

      a.pay-button {
        display: block;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Polly Bills</h1>
    <div class="subtitle">Bill links, due dates, and payment amounts</div>

    <div id="status" class="status">Loading bills...</div>
    <div id="app"></div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlCbzsJ8bBL4foJvJJEcTO2PpRZjENYMTZDU_WMf-h-2bwR9M6cwM7f0tWWWS0v4tukw/exec";

    const app = document.getElementById("app");
    const statusBox = document.getElementById("status");

    function loadBills() {
      fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
          statusBox.textContent = "";
          renderBills(data);
        })
        .catch(error => {
          statusBox.textContent = "Could not load bills. Check Apps Script permissions.";
          console.error(error);
        });
    }

    function renderBills(items) {
      app.innerHTML = "";

      const categories = [...new Set(items.map(item => item.Category))];

      categories.forEach(category => {
        const section = document.createElement("section");
        section.innerHTML = `<h2>${category}</h2>`;

        items
          .filter(item => item.Category === category)
          .forEach(item => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
              <div class="row">
                <div class="biller">${item.Biller || ""}</div>

                <input 
                  type="date" 
                  value="${formatDate(item.DueDate)}"
                  onchange="saveField('${item.ID}', 'DueDate', this.value, this)"
                >

                <input 
                  type="number" 
                  step="0.01"
                  placeholder="Amount"
                  value="${item.Amount || ""}"
                  onchange="saveField('${item.ID}', 'Amount', this.value, this)"
                >

                ${item.Website 
                  ? `<a class="pay-button" href="${item.Website}" target="_blank">Open</a>` 
                  : `<span></span>`
                }
              </div>

              <div class="paid-area">
                <input 
                  type="checkbox" 
                  ${String(item.Paid).toUpperCase() === "TRUE" ? "checked" : ""}
                  onchange="saveField('${item.ID}', 'Paid', this.checked ? 'TRUE' : 'FALSE', this)"
                >
                <label>Paid</label>
              </div>

              <div class="notes">
                <input 
                  type="text" 
                  placeholder="Notes"
                  value="${item.Notes || ""}"
                  onchange="saveField('${item.ID}', 'Notes', this.value, this)"
                >
              </div>

              <div class="save-msg">Saved</div>
            `;

            section.appendChild(card);
          });

        app.appendChild(section);
      });
    }

    function saveField(id, field, value, element) {
      const card = element.closest(".card");
      const msg = card.querySelector(".save-msg");

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          ID: id,
          [field]: value
        })
      })
      .then(response => response.text())
      .then(() => {
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 1200);
      })
      .catch(error => {
        alert("Could not save. Check connection or Apps Script settings.");
        console.error(error);
      });
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (isNaN(date)) return value;
      return date.toISOString().split("T")[0];
    }

    loadBills();
  </script>
</body>
</html>
