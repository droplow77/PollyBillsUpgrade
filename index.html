<!DOCTYPE html>
<html>
<head>
  <title>Polly's Bills</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; color: #222; }
    .container { max-width: 900px; margin: auto; }
    h1 { text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 25px; }
    h2 { margin-top: 30px; border-bottom: 2px solid #ddd; padding-bottom: 8px; }

    .card, .add-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 6px solid transparent;
    }

    .overdue { background: #ffecec; border-left-color: #d93025; }
    .upcoming { background: #fff8db; border-left-color: #fbbc04; }
    .paid-card { opacity: 0.75; }

    .row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .bank-row {
      display: grid;
      grid-template-columns: 1.5fr auto;
      gap: 10px;
      align-items: center;
    }

    .add-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .biller { font-size: 18px; font-weight: bold; }

    .due-label { font-size: 13px; font-weight: bold; margin-top: 8px; }
    .overdue-text { color: #d93025; }
    .upcoming-text { color: #8a6500; }

    a.pay-button, button {
      background: #1a73e8;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      text-align: center;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    button { margin-top: 15px; width: 100%; }

    input, select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      width: 100%;
      box-sizing: border-box;
    }

    label { font-size: 14px; font-weight: bold; color: #444; }

    .money-box { position: relative; }
    .money-box span {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: bold;
    }
    .money-box input { padding-left: 24px; }

    .check-row {
      margin-top: 10px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .check-item input { width: auto; }

    .notes { margin-top: 10px; }

    @media (max-width: 700px) {
      .row, .bank-row, .add-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div class="container">
<h1>Polly's Bills</h1>
<div class="subtitle">Bill links, due dates, and payment amounts</div>

<div id="app"></div>

<section>
<h2>Add New Account</h2>

<div class="add-card">
<div class="add-grid">

<div>
<label>Type</label>
<select id="newCategory" onchange="toggleNewFields()">
<option value="Bills">Bill</option>
<option value="Bank Accounts">Bank Account</option>
</select>
</div>

<div>
<label>Name</label>
<input id="newBiller" placeholder="Example: Duke Energy">
</div>

<div>
<label>Website</label>
<input id="newWebsite" placeholder="https://example.com">
</div>

<div class="bill-only">
<label>Due Date</label>
<input id="newDueDate" type="date">
</div>

<div class="bill-only">
<label>Amount</label>
<div class="money-box">
<span>$</span>
<input id="newAmount" placeholder="Amount">
</div>
</div>

<div class="bill-only">
<label>AutoPay</label>
<select id="newAutoPay">
<option value="FALSE">No</option>
<option value="TRUE">Yes</option>
</select>
</div>

<div>
<label>Notes</label>
<input id="newNotes" placeholder="Notes">
</div>

</div>

<button onclick="addNewAccount()">Add Account</button>
</div>
</section>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrQvUJoyFMkGR5WERF3W4U4TNaab8yXdiVbHPW7eD_BwkJSSLHMpGpDnfN2ERZB0NnZw/exec";

function loadBills() {
fetch(SCRIPT_URL).then(r=>r.json()).then(data=>{
autoAdvance(data);
render(data);
});
}

function render(items) {
const app=document.getElementById("app");
app.innerHTML="";

const categories=[...new Set(items.map(i=>i.Category))];

categories.forEach(cat=>{
const sec=document.createElement("section");
sec.innerHTML=`<h2>${cat}</h2>`;

let list=items.filter(i=>i.Category===cat);

if(cat==="Bills"){
list.sort((a,b)=>new Date(a.DueDate)-new Date(b.DueDate));
}

list.forEach(item=>{
const card=document.createElement("div");
card.className="card";

if(cat==="Bank Accounts"){
card.innerHTML=`
<div class="bank-row">
<div class="biller">${item.Biller}</div>
<a class="pay-button" href="${item.Website}" target="_blank">Visit Website</a>
</div>

<div class="notes">
<input placeholder="Notes" value="${item.Notes||""}"
onchange="save('${item.ID}','Notes',this.value)">
</div>
`;
}else{

const paid=item.Paid==="TRUE";
const autopay=item.AutoPay==="TRUE";
const status=getStatus(item.DueDate,paid);

if(status==="overdue") card.classList.add("overdue");
if(status==="upcoming") card.classList.add("upcoming");
if(paid) card.classList.add("paid-card");

card.innerHTML=`
<div class="row">
<div class="biller">${item.Biller}</div>

<input type="date" value="${format(item.DueDate)}"
onchange="save('${item.ID}','DueDate',this.value)">

<div class="money-box">
<span>$</span>
<input placeholder="Amount" value="${item.Amount||""}"
onchange="save('${item.ID}','Amount',this.value)">
</div>

<a class="pay-button" href="${item.Website}" target="_blank">Visit Website</a>
</div>

<div class="check-row">
<div class="check-item">
<input type="checkbox" ${paid?"checked":""}
onchange="save('${item.ID}','Paid',this.checked?'TRUE':'FALSE')">
<label>Paid</label>
</div>

<div class="check-item">
<input type="checkbox" ${autopay?"checked":""}
onchange="save('${item.ID}','AutoPay',this.checked?'TRUE':'FALSE')">
<label>AutoPay</label>
</div>
</div>

<div class="notes">
<input placeholder="Notes" value="${item.Notes||""}"
onchange="save('${item.ID}','Notes',this.value)">
</div>
`;
}

sec.appendChild(card);
});

app.appendChild(sec);
});
}

function save(id,field,value){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({ID:id,[field]:value})
}).then(()=>loadBills());
}

function addNewAccount(){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
Action:"ADD",
ID:Date.now(),
Category:newCategory.value,
Biller:newBiller.value,
Website:newWebsite.value,
DueDate:newCategory.value==="Bills"?newDueDate.value:"",
Amount:newCategory.value==="Bills"?newAmount.value:"",
Paid:"FALSE",
AutoPay:newAutoPay.value,
Notes:newNotes.value
})
}).then(()=>loadBills());
}

function autoAdvance(items){
const today=new Date();

items.forEach(i=>{
if(i.AutoPay==="TRUE" && new Date(i.DueDate)<today){
let d=new Date(i.DueDate);
d.setMonth(d.getMonth()+1);
save(i.ID,"DueDate",d.toISOString().split("T")[0]);
save(i.ID,"Paid","FALSE");
}
});
}

function format(d){
if(!d) return "";
return new Date(d).toISOString().split("T")[0];
}

function getStatus(d,paid){
if(!d||paid) return "";
const today=new Date();
const due=new Date(d);
const diff=(due-today)/(1000*60*60*24);

if(diff<0) return "overdue";
if(diff<=7) return "upcoming";
return "";
}

function toggleNewFields(){
document.querySelectorAll(".bill-only")
.forEach(el=>el.style.display=newCategory.value==="Bills"?"block":"none");
}

loadBills();
</script>

</body>
</html>
